config:
  validation: false
  warningsAsErrors: false
  excludes: [ ]

complexity:
  LongMethod:
    active: true
    allowedLines: 60
  LongParameterList:
    active: true
    allowedFunctionParameters: 7
    allowedConstructorParameters: 8
    ignoreDataClasses: true
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 14
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
    ignoreNestingFunctions: false
    nestingFunctions:
      - also
      - apply
      - forEach
      - let
      - run
      - use
      - with
  ComplexCondition:
    active: true
    allowedConditions: 3
  NestedBlockDepth:
    active: true
    allowedDepth: 4
  LargeClass:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
    allowedLines: 600
  TooManyFunctions:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
      - '**/androidTest/**'
      - '**/androidHostTest/**'
    allowedFunctionsPerFile: 11
    allowedFunctionsPerClass: 11
    allowedFunctionsPerInterface: 11
    allowedFunctionsPerObject: 11
    allowedFunctionsPerEnum: 11

naming:
  ClassNaming:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
  FunctionNaming:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
      - '**/androidTest/**'
      - '**/androidHostTest/**'
    functionPattern: '[a-z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'

potential-bugs:
  UnsafeCallOnNullableType:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
      - '**/androidTest/**'
      - '**/androidHostTest/**'

style:
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Forbidden FIXME marker; fix the problem.'
        value: 'FIXME:'
      - reason: 'Forbidden STOPSHIP marker; address the problem before shipping.'
        value: 'STOPSHIP:'
      - reason: 'Forbidden TODO marker; complete the work.'
        value: 'TODO:'
  MagicNumber:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
      - '**/androidTest/**'
      - '**/androidHostTest/**'
      - '**/*.kts'
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignoreConstantDeclaration: true
    ignoreNamedArgument: true
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: true
    maxLineLength: 150
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
    excludeRawStrings: true
  NewLineAtEndOfFile:
    active: true

exceptions:
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes:
      - '**/*Test/**'
      - '**/test/**'
