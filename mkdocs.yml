site_name: Arch Android Toolkit
site_description: Kotlin-first Android utilities designed for Android and KMP projects.
site_url: https://matheus-corregiari.github.io/arch-android/
repo_url: https://github.com/matheus-corregiari/arch-android
edit_uri: blob/master/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/android
  palette:
    primary: white
    accent: teal
  features:
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts: core-concepts.md
  - Usage Recipes: recipes.md
  - Changelog:
      - Overview: changelog/index.md
      - 1.1.0: changelog/1.1.0.md
      - 1.0.0: changelog/1.0.0.md
  - Contributing: contributing.md
  - API Reference:
      - Overview: api/index.md
      - Android: api/android.md
